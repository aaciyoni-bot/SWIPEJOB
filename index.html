<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOOJOB - מערכת המגייסים החכמה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Frank+Ruhl+Libre:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
            touch-action: none;
        }

        /* פונט סריף מסורתי יותר לשמות בקורות חיים כדי לתת מראה של מסמך */
        .cv-name {
            font-family: 'Frank Ruhl Libre', serif;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            height: 100dvh;
            background-color: white;
            position: relative;
            box-shadow: 0 0 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .cards-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e2e8f0; /* רקע קצת יותר כהה כדי שהדף הלבן יבלוט */
        }

        /* עיצוב כרטיסיית קורות החיים (מסמך) */
        .swipe-card {
            position: absolute;
            width: calc(100% - 3rem);
            height: calc(100% - 2rem);
            background-color: white;
            border-radius: 0.5rem; /* פינות פחות עגולות למראה של דף */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #cbd5e1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            will-change: transform;
            cursor: grab;
            transition: transform 0.3s ease-out;
        }

        .swipe-card.dragging {
            transition: none;
            cursor: grabbing;
        }

        .card-content {
            padding: 1.5rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
        }

        .skill-tag {
            background-color: #f1f5f9;
            color: #475569;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            margin-left: 0.4rem;
            margin-bottom: 0.4rem;
            display: inline-block;
            border: 1px solid #e2e8f0;
        }

        /* אנימציות העלמה */
        .swipe-left-anim { transform: translateX(-150vw) rotate(-20deg) !important; opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; }
        .swipe-right-anim { transform: translateX(150vw) rotate(20deg) !important; opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; }
        .swipe-super-anim { transform: translateY(-150vh) !important; opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; }

        /* סטאמפים (חותמות) */
        .stamp {
            position: absolute;
            top: 40px;
            padding: 0.5rem 1rem;
            border: 4px solid;
            border-radius: 0.5rem;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
        }
        .stamp-nope { right: 20px; color: #ef4444; border-color: #ef4444; transform: rotate(15deg); }
        .stamp-like { left: 20px; color: #10b981; border-color: #10b981; transform: rotate(-15deg); }
        .stamp-super { bottom: 60px; left: 50%; transform: translateX(-50%) scale(1.5); color: #3b82f6; border-color: #3b82f6; }

        .ai-badge {
            background: #f0fdf4;
            color: #059669;
            padding: 0.15rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            border: 1px solid #bbf7d0;
        }

        /* מודאל הראיון (החליף את הפתקית) */
        #interview-modal {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
        }
        
        .modal-scrollable-content {
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        /* --- הגדרות הדפסה --- */
        @media print {
            body * { visibility: hidden; }
            #interview-modal, #interview-modal * { visibility: visible; }
            #interview-modal {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                background: transparent !important;
                padding: 0 !important;
            }
            .print-container {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div class="app-container" id="app">

    <!-- מסך פתיחה למגייס -->
    <div id="welcome-screen" class="absolute inset-0 flex flex-col justify-center items-center bg-white z-50 p-6 text-center overflow-y-auto">
        <div class="w-24 h-24 bg-slate-800 rounded-2xl flex justify-center items-center mb-6 shadow-lg flex-shrink-0">
            <i class="fa-solid fa-file-lines text-white text-5xl"></i>
        </div>
        <h1 class="text-4xl font-extrabold text-slate-800 mb-2">GOOJOB</h1>
        <p class="text-slate-500 mb-8 text-lg font-medium">מערכת סינון קו"ח חכמה.</p>

        <!-- שלב 1: הגדרת משימת הסינון -->
        <div id="role-selection" class="w-full max-w-sm">
            <button onclick="showRegistration('employer')" class="w-full bg-white border-2 border-slate-300 hover:border-emerald-500 hover:bg-emerald-50 text-slate-700 font-bold py-4 px-6 rounded-xl mb-4 transition-all text-lg flex items-center justify-start gap-4 shadow-sm text-right">
                <div class="bg-emerald-100 p-3 rounded-full"><i class="fa-solid fa-user-tie text-emerald-600"></i></div>
                <div>
                    <div class="leading-tight">אני מסנן קורות חיים</div>
                    <div class="text-sm font-normal text-slate-500">מחפש מועמדים למשרה פתוחה</div>
                </div>
            </button>
            
            <button onclick="showRegistration('candidate')" class="w-full bg-white border-2 border-slate-300 hover:border-blue-500 hover:bg-blue-50 text-slate-700 font-bold py-4 px-6 rounded-xl mb-4 transition-all text-lg flex items-center justify-start gap-4 shadow-sm text-right">
                <div class="bg-blue-100 p-3 rounded-full"><i class="fa-solid fa-briefcase text-blue-600"></i></div>
                <div>
                    <div class="leading-tight">אני מסנן משרות</div>
                    <div class="text-sm font-normal text-slate-500">מחפש משרה עבור מועמד שלי</div>
                </div>
            </button>
        </div>

        <!-- שלב 2: הגדרות -->
        <div id="registration-form" class="hidden w-full max-w-sm flex-col items-center text-right">
            <h2 class="text-xl font-bold text-slate-800 mb-6 w-full text-center border-b pb-2" id="setup-title">הגדרת סשן סינון</h2>
            
            <div class="w-full mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-1" id="target-name-label">שם המשרה עבורה אתה מסנן</label>
                <input type="text" id="target-name-input" placeholder="לדוגמה: מפתח פולסטאק בכיר" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 outline-none bg-slate-50">
            </div>

            <div class="w-full mb-6">
                <label class="block text-sm font-semibold text-slate-700 mb-1">קטגוריה במאגר</label>
                <select id="user-category-input" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 outline-none bg-slate-50 max-h-48 overflow-y-auto font-medium">
                    <!-- Options populated by JS -->
                </select>
            </div>

            <button onclick="completeRegistration()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-transform transform active:scale-95 text-lg flex items-center justify-center gap-3">
                <i class="fa-solid fa-play"></i>
                התחל סריקת קורות חיים
            </button>
            <button onclick="goBackToRoles()" class="mt-4 text-slate-500 hover:text-slate-700 text-sm w-full text-center font-medium">חזרה לאחור</button>
        </div>
    </div>

    <!-- מסך ראשי - זירת ההחלקה למגייס -->
    <div id="main-screen" class="hidden flex-col h-full w-full">
        <!-- Header -->
        <div class="flex justify-between items-center p-4 border-b border-slate-200 shadow-sm z-10 bg-white">
            <div class="flex gap-4">
                <button onclick="resetApp()" class="text-slate-400 hover:text-slate-600 transition-colors" title="סיום סשן">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
                <button onclick="openArchive()" class="text-emerald-600 hover:text-emerald-700 transition-colors relative" title="ארכיון ראיונות">
                    <i class="fa-solid fa-folder-open text-xl"></i>
                    <span id="archive-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold hidden">0</span>
                </button>
            </div>

            <div class="flex flex-col items-center">
                <h1 class="text-lg font-black text-slate-800 flex items-center gap-1 tracking-tight">
                    GOOJOB
                </h1>
            </div>

            <div class="text-emerald-700 font-bold bg-emerald-50 px-3 py-1.5 rounded-full shadow-sm border border-emerald-100 flex items-center gap-2">
                <span id="match-count">0</span> <i class="fa-solid fa-user-check"></i>
            </div>
        </div>

        <div class="bg-slate-800 text-white text-xs px-4 py-2 flex justify-between items-center">
            <span class="font-medium opacity-70">מסנן עבור:</span>
            <span id="session-target-name" class="font-bold truncate max-w-[200px]">...</span>
        </div>

        <!-- Cards Area -->
        <div class="cards-container" id="cards-container">
            <div id="no-more-cards" class="hidden text-center text-slate-500 w-full">
                <div class="w-20 h-20 bg-white shadow-sm rounded-full flex justify-center items-center mx-auto mb-4 border border-slate-200">
                    <i class="fa-solid fa-inbox text-3xl text-slate-400"></i>
                </div>
                <h2 class="text-xl font-bold mb-2 text-slate-700">המאגר ריק כרגע</h2>
                <p class="text-sm">סיימת לסרוק את כל הרשומות בקטגוריה זו.</p>
                <button onclick="location.reload()" class="mt-6 px-6 py-2 bg-slate-800 text-white rounded-full font-bold">רענן נתונים</button>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-center items-center gap-6 p-4 pb-6 bg-white z-10 border-t border-slate-200">
            <button onclick="rewindCard()" class="w-12 h-12 bg-white rounded-full shadow border border-slate-200 flex justify-center items-center text-slate-400 text-xl hover:bg-slate-50 transition-all">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
            <button onclick="handleButtonAction('left')" class="w-16 h-16 bg-white rounded-full shadow-md border border-slate-100 flex justify-center items-center text-red-500 text-2xl hover:bg-red-50 transition-all active:scale-95">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <button onclick="handleButtonAction('right')" class="w-16 h-16 bg-emerald-600 rounded-full shadow-md flex justify-center items-center text-white text-2xl hover:bg-emerald-700 transition-all active:scale-95">
                <i class="fa-solid fa-check"></i>
            </button>
        </div>
    </div>

    <!-- מסך ראיון / תיק מועמד (נפתח ישירות אחרי החלקה ימינה) -->
    <div id="interview-modal" class="hidden absolute inset-0 z-[110] flex-col items-center justify-center p-4">
        <div class="w-full max-w-lg bg-white rounded-xl shadow-2xl flex flex-col modal-scrollable-content print-container relative animate-[fly-up_0.2s_ease-out_forwards]">
            
            <!-- Header פעולה מיידית -->
            <div class="bg-slate-800 text-white p-6 rounded-t-xl text-center relative">
                <button onclick="closeInterviewModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl no-print"><i class="fa-solid fa-xmark"></i></button>
                
                <h2 id="interview-name" class="text-2xl font-bold cv-name mb-1">שם המועמד</h2>
                <p id="interview-title" class="text-emerald-400 text-sm font-medium mb-4">תפקיד נוכחי</p>
                
                <!-- מספר טלפון ענק לראיון מיידי -->
                <div class="bg-white/10 rounded-lg p-3 inline-block w-full max-w-xs mx-auto border border-white/20 mb-4">
                    <div class="text-xs text-slate-300 mb-1 uppercase tracking-widest font-bold">התקשר עכשיו</div>
                    <div id="interview-phone" class="text-4xl font-black text-white tracking-wider dir-ltr inline-block">050-0000000</div>
                </div>

                <div class="flex justify-center gap-3 no-print">
                    <button class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2" onclick="showToast('מחייג...', 'success')">
                        <i class="fa-solid fa-phone"></i> חיוג
                    </button>
                    <button class="bg-[#25D366] hover:bg-[#128C7E] text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2" onclick="showToast('פותח וואטסאפ...', 'success')">
                        <i class="fa-brands fa-whatsapp text-lg"></i> הודעה
                    </button>
                </div>
            </div>

            <!-- תוכן התיק (קו"ח + שאלות) -->
            <div class="p-6 text-right" dir="rtl">
                
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-emerald-100 text-emerald-800 px-2 py-1 rounded text-xs font-bold"><i class="fa-solid fa-robot"></i> AI התאמה: <span id="interview-score">90</span>%</span>
                    <span class="text-xs text-slate-500">עבור: <span id="interview-target-name" class="font-bold">משרה</span></span>
                </div>

                <!-- תקציר קו"ח -->
                <div class="mb-6">
                    <h3 class="font-bold text-slate-800 border-b-2 border-slate-200 pb-1 mb-3 text-sm uppercase">תקציר קורות חיים</h3>
                    <div class="space-y-3 text-sm text-slate-600">
                        <div class="flex gap-2 items-start"><i class="fa-solid fa-briefcase text-slate-400 mt-1"></i> <span id="interview-experience">ניסיון</span></div>
                        <div class="flex gap-2 items-start"><i class="fa-solid fa-graduation-cap text-slate-400 mt-1"></i> <span id="interview-education">השכלה</span></div>
                        <div class="flex gap-2 items-start"><i class="fa-solid fa-money-bill-wave text-slate-400 mt-1"></i> <span id="interview-salary">שכר</span></div>
                        <div class="mt-2 text-slate-700 bg-slate-50 p-3 rounded border border-slate-100" id="interview-about"></div>
                        <div class="mt-2" id="interview-skills"></div>
                    </div>
                </div>

                <!-- שאלות מומלצות לראיון -->
                <div class="mb-2">
                    <h3 class="font-bold text-emerald-700 border-b-2 border-emerald-100 pb-1 mb-3 text-sm uppercase flex items-center gap-2">
                        <i class="fa-solid fa-clipboard-question"></i> מדריך לראיון הטלפוני
                    </h3>
                    <ul class="list-none space-y-3 text-sm text-slate-700" id="interview-questions">
                        <!-- Questions injected here -->
                    </ul>
                </div>

                <!-- פעולות -->
                <div class="border-t border-slate-200 pt-4 mt-6 no-print flex flex-col gap-2">
                    <button onclick="saveAndCloseInterview()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-800 py-3 rounded-lg text-sm font-bold border border-slate-300 flex justify-center items-center gap-2 transition-colors">
                        <i class="fa-solid fa-folder-plus text-emerald-600"></i> שמור לארכיון והמשך לסרוק
                    </button>
                    <button onclick="window.print()" class="w-full text-slate-500 hover:text-slate-800 py-2 text-sm font-medium underline">
                        הדפס תיק מועמד
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- מודאל ארכיון -->
    <div id="archive-modal" class="hidden absolute inset-0 z-[120] bg-slate-100 flex-col overflow-y-auto">
        <div class="p-4 bg-white shadow-sm flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-folder-open text-emerald-600"></i> ארכיון התאמות
            </h2>
            <button onclick="closeArchive()" class="text-slate-400 hover:text-slate-600 text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="p-4 space-y-3" id="archive-list"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-[-100px] left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg transition-all duration-300 z-[130] flex items-center gap-3 w-11/12 max-w-sm">
        <i class="fa-solid fa-circle-info text-blue-400"></i>
        <span id="toast-msg" class="text-sm font-medium">הודעה</span>
    </div>

</div>

<script>
    // --- נתונים גנריים ---
    const categoriesData = {
        'tech': { title: 'הייטק ופיתוח תוכנה', jobs: ['מפתח/ת Full Stack', 'מדען/ית נתונים', 'איש/אשת DevOps', 'מעצב/ת UX/UI'], skills: ['React', 'Node.js', 'Python', 'AWS', 'SQL', 'Docker'] },
        'logistics': { title: 'לוגיסטיקה ורכש', jobs: ['מנהל/ת מחסן', 'מנהל/ת תפעול', 'קניין/ית רכש', 'מנהל/ת שרשרת אספקה'], skills: ['ניהול מלאי', 'ERP', 'סחר בינלאומי', 'תכנון רכש', 'Priority'] },
        'marketing': { title: 'שיווק ודיגיטל', jobs: ['מנהל/ת קמפיינים', 'מומחה/ית SEO', 'מנהל/ת סושיאל', 'קופירייטר/ית'], skills: ['PPC', 'Google Analytics', 'ניהול תקציב', 'Meta Ads', 'HubSpot'] },
        'finance': { title: 'כספים וראיית חשבון', jobs: ['רואה/ת חשבון', 'כלכלן/ית', 'חשב/ת שכר', 'מנהל/ת כספים'], skills: ['אקסל מתקדם', 'הנהלת חשבונות', 'חשבות', 'ניתוח דוחות'] },
        'sales': { title: 'מכירות', jobs: ['מנהל/ת מכירות', 'איש/אשת מכירות שטח', 'SDR', 'מנהל/ת תיקי לקוחות'], skills: ['B2B', 'ניהול משא ומתן', 'Salesforce', 'שימור לקוחות'] },
        'admin': { title: 'אדמיניסטרציה', jobs: ['מזכיר/ה', 'מנהל/ת משרד', 'עוזר/ת אישי/ת (PA)'], skills: ['ארגון וסדר', 'אופיס', 'ניהול יומנים', 'אנגלית ברמה גבוהה'] }
    };

    const selectEl = document.getElementById('user-category-input');
    Object.entries(categoriesData).forEach(([key, val]) => {
        const opt = document.createElement('option');
        opt.value = key; opt.innerText = val.title; selectEl.appendChild(opt);
    });

    const firstNames = ['רועי', 'נועה', 'דוד', 'שרה', 'עומר', 'יעל', 'אבי', 'מיכל', 'תומר', 'רוני'];
    const lastNames = ['כהן', 'לוי', 'מזרחי', 'פרץ', 'ביטון', 'דגן', 'שפירא', 'אברהם'];
    const companies = ['TechHub', 'DataCore', 'GlobalLogistics', 'FastDeliver', 'AdMasters', 'StartUp IL'];
    
    function getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function generatePhone() { return `05${Math.floor(Math.random() * 5 + 0)}-${Math.floor(Math.random() * 9000000 + 1000000)}`; }

    let mockCandidates = [];
    let mockJobs = [];

    Object.keys(categoriesData).forEach(cat => {
        const data = categoriesData[cat];
        for(let i=0; i<15; i++) {
            const sharedSkills = [...data.skills].sort(() => 0.5 - Math.random()).slice(0, 3);
            
            mockJobs.push({
                id: `j_${cat}_${i}`, type: 'job', category: cat,
                company: getRandomItem(companies),
                title: getRandomItem(data.jobs),
                location: getRandomItem(['תל אביב', 'הרצליה', 'רמת גן', 'חיפה', 'היברידי', 'מרחוק']),
                salary: `${Math.floor(Math.random() * 15 + 10)},000 ₪`,
                availability: getRandomItem(['משרה מלאה', 'חצי משרה', 'משמרות']),
                skills: sharedSkills,
                about: `חברה בצמיחה מחפשת ${getRandomItem(data.jobs)} מקצועי/ת להשתלבות בצוות. סביבת עבודה טכנולוגית, נדרשת יכולת עבודה עצמאית.`,
                culturalFit: Math.floor(Math.random() * 20 + 80),
                phone: generatePhone()
            });

            mockCandidates.push({
                id: `c_${cat}_${i}`, type: 'candidate', category: cat,
                name: `${getRandomItem(firstNames)} ${getRandomItem(lastNames)}`,
                title: getRandomItem(data.jobs),
                experience: `${Math.floor(Math.random() * 8) + 1} שנות ניסיון`,
                salary: `ציפיות: ${Math.floor(Math.random() * 15 + 10)},000 ₪`,
                degree: getRandomItem(['תואר ראשון', 'הנדסאי', 'הכשרה מקצועית']),
                skills: sharedSkills,
                about: `מחפש/ת אתגר מקצועי בתחום ה${data.title}. בעל/ת מוסר עבודה גבוה, יחסי אנוש מעולים ויכולת למידה מהירה.`,
                culturalFit: Math.floor(Math.random() * 20 + 80),
                phone: generatePhone()
            });
        }
    });

    // --- State ---
    let currentUserRole = null;
    let currentTargetName = '';
    let currentUserCategory = 'tech';
    let currentDeck = [];
    let topCardIndex = 0;
    let matchCount = 0;
    let lastSwipedCard = null;
    let currentMatchedItem = null;
    let savedNotes = [];

    // --- פונקציות מסכים ---
    function showRegistration(role) {
        currentUserRole = role;
        document.getElementById('role-selection').classList.add('hidden');
        document.getElementById('registration-form').classList.remove('hidden');
        document.getElementById('registration-form').classList.add('flex');
        
        document.getElementById('target-name-label').innerText = role === 'employer' ? 'עבור איזו משרה אתה מסנן?' : 'עבור מי אתה מחפש משרה?';
        document.getElementById('target-name-input').placeholder = role === 'employer' ? 'לדוגמה: מפתח ג\'אווה' : 'לדוגמה: דניאל (מועמד)';
    }

    function goBackToRoles() {
        document.getElementById('registration-form').classList.add('hidden');
        document.getElementById('registration-form').classList.remove('flex');
        document.getElementById('role-selection').classList.remove('hidden');
    }

    function completeRegistration() {
        currentTargetName = document.getElementById('target-name-input').value || (currentUserRole === 'employer' ? 'משרה פתוחה' : 'מועמד בטיפול');
        currentUserCategory = document.getElementById('user-category-input').value;
        
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.replace('hidden', 'flex');
        document.getElementById('session-target-name').innerText = currentTargetName;

        currentDeck = (currentUserRole === 'employer' ? mockCandidates : mockJobs)
                        .filter(x => x.category === currentUserCategory)
                        .sort(() => 0.5 - Math.random());
        
        renderCards();
    }

    function resetApp() {
        document.getElementById('main-screen').classList.replace('flex', 'hidden');
        document.getElementById('welcome-screen').classList.remove('hidden');
        goBackToRoles();
        document.getElementById('target-name-input').value = '';
        matchCount = 0; document.getElementById('match-count').innerText = matchCount;
        topCardIndex = 0;
        document.getElementById('cards-container').innerHTML = `<div id="no-more-cards" class="hidden text-center text-slate-500 w-full"><div class="w-20 h-20 bg-white shadow-sm rounded-full flex justify-center items-center mx-auto mb-4 border border-slate-200"><i class="fa-solid fa-inbox text-3xl text-slate-400"></i></div><h2 class="text-xl font-bold mb-2 text-slate-700">המאגר ריק כרגע</h2><button onclick="location.reload()" class="mt-4 px-6 py-2 bg-slate-800 text-white rounded-full font-bold">רענן נתונים</button></div>`;
    }

    // --- רינדור קורות החיים (הכרטיסיות החדשות) ---
    function renderCards() {
        for (let i = topCardIndex; i < Math.min(topCardIndex + 3, currentDeck.length); i++) {
            if(document.getElementById(`card-${i}`)) continue;
            
            const item = currentDeck[i];
            const cardEl = document.createElement('div');
            cardEl.className = 'swipe-card';
            cardEl.id = `card-${i}`;
            cardEl.style.zIndex = currentDeck.length - i;
            
            const isTopCard = i === topCardIndex;
            const stampNope = `<div class="stamp stamp-nope" id="stamp-nope-${i}">פסול</div>`;
            const stampLike = `<div class="stamp stamp-like" id="stamp-like-${i}">אישור</div>`;

            if (item.type === 'job') {
                // מראה של תיאור משרה רשמי (JD)
                cardEl.innerHTML = `
                    ${stampNope} ${stampLike}
                    <div class="card-content">
                        <div class="border-b-2 border-slate-800 pb-4 mb-4">
                            <h2 class="text-3xl font-bold cv-name text-slate-900 mb-1 leading-tight">${item.company}</h2>
                            <h3 class="text-lg text-slate-600 font-medium bg-slate-100 inline-block px-2 py-1 rounded">דרוש/ה: ${item.title}</h3>
                        </div>
                        <div class="flex-grow space-y-4">
                            <div><h4 class="font-bold text-slate-800 text-sm mb-1 uppercase tracking-wider">פרטי משרה</h4><p class="text-sm text-slate-600"><i class="fa-solid fa-location-dot w-4"></i> ${item.location}<br><i class="fa-solid fa-money-bill-wave w-4"></i> תקציב: ${item.salary}<br><i class="fa-regular fa-clock w-4"></i> ${item.availability}</p></div>
                            <div><h4 class="font-bold text-slate-800 text-sm mb-1 uppercase tracking-wider">על התפקיד</h4><p class="text-sm text-slate-600 leading-relaxed">${item.about}</p></div>
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm mb-2 uppercase tracking-wider">דרישות חובה</h4>
                                <div>${item.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-200">
                            <span class="ai-badge"><i class="fa-solid fa-crosshairs"></i> ${item.culturalFit}% התאמה לתנאי המועמד שלך</span>
                        </div>
                    </div>
                `;
            } else {
                // מראה של קורות חיים (CV) נקי
                cardEl.innerHTML = `
                    ${stampNope} ${stampLike}
                    <div class="card-content">
                        <div class="border-b-2 border-slate-800 pb-4 mb-4">
                            <h2 class="text-3xl font-bold cv-name text-slate-900 mb-1">${item.name}</h2>
                            <h3 class="text-lg text-slate-600">${item.title}</h3>
                        </div>
                        <div class="flex-grow space-y-4">
                            <div><h4 class="font-bold text-slate-800 text-sm mb-1 uppercase tracking-wider">תמצית מנהלים</h4><p class="text-sm text-slate-600 leading-relaxed">${item.about}</p></div>
                            <div><h4 class="font-bold text-slate-800 text-sm mb-1 uppercase tracking-wider">ניסיון והשכלה</h4><p class="text-sm text-slate-600"><i class="fa-solid fa-briefcase w-4"></i> ${item.experience}<br><i class="fa-solid fa-graduation-cap w-4"></i> ${item.degree}<br><i class="fa-solid fa-money-bill-wave w-4"></i> ${item.salary}</p></div>
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm mb-2 uppercase tracking-wider">כישורים טכניים</h4>
                                <div>${item.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-200">
                            <span class="ai-badge"><i class="fa-solid fa-crosshairs"></i> ${item.culturalFit}% התאמה לדרישות המשרה</span>
                        </div>
                    </div>
                `;
            }

            document.getElementById('cards-container').insertBefore(cardEl, document.getElementById('no-more-cards'));
            if (isTopCard) initDragLogic(cardEl, i);
        }
        updateCardPositions();
    }

    function updateCardPositions() {
        const cards = Array.from(document.getElementById('cards-container').querySelectorAll('.swipe-card:not(.swiped)'));
        cards.forEach((card, index) => {
            if (index === 0) card.style.transform = 'scale(1) translateY(0)';
            else if (index === 1) card.style.transform = 'scale(0.95) translateY(10px)';
            else if (index === 2) card.style.transform = 'scale(0.90) translateY(20px)';
            else card.style.display = 'none';
        });
        if(cards.length === 0) document.getElementById('no-more-cards').classList.remove('hidden');
    }

    // --- Drag & Swipe Logic ---
    function initDragLogic(card, index) {
        let isDragging = false, startX = 0, startY = 0, currentX = 0, currentY = 0;
        const stampNope = document.getElementById(`stamp-nope-${index}`);
        const stampLike = document.getElementById(`stamp-like-${index}`);

        const handleStart = (e) => {
            isDragging = true; card.classList.add('dragging');
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            currentX = (e.type.includes('mouse') ? e.clientX : e.touches[0].clientX) - startX;
            currentY = (e.type.includes('mouse') ? e.clientY : e.touches[0].clientY) - startY;
            card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${currentX * 0.03}deg)`;

            if (currentX > 50) { stampLike.style.opacity = Math.min(currentX/100, 1); stampNope.style.opacity = 0; } 
            else if (currentX < -50) { stampNope.style.opacity = Math.min(Math.abs(currentX)/100, 1); stampLike.style.opacity = 0; } 
            else { stampLike.style.opacity = 0; stampNope.style.opacity = 0; }
        };

        const handleEnd = () => {
            if (!isDragging) return;
            isDragging = false; card.classList.remove('dragging');
            const threshold = window.innerWidth * 0.25;

            if (currentX > threshold) processSwipe('right', card, index);
            else if (currentX < -threshold) processSwipe('left', card, index);
            else { card.style.transform = 'scale(1) translateY(0)'; stampLike.style.opacity = 0; stampNope.style.opacity = 0; }
            currentX = 0; currentY = 0;
        };

        card.addEventListener('mousedown', handleStart); card.addEventListener('touchstart', handleStart, {passive: true});
        document.addEventListener('mousemove', handleMove); document.addEventListener('touchmove', handleMove, {passive: true});
        document.addEventListener('mouseup', handleEnd); document.addEventListener('touchend', handleEnd);
        card._dragListeners = { handleMove, handleEnd };
    }

    function processSwipe(direction, cardEl, index) {
        cardEl.classList.add('swiped');
        lastSwipedCard = { direction, index, item: currentDeck[index] };
        
        if(cardEl._dragListeners) {
            document.removeEventListener('mousemove', cardEl._dragListeners.handleMove);
            document.removeEventListener('touchmove', cardEl._dragListeners.handleMove);
            document.removeEventListener('mouseup', cardEl._dragListeners.handleEnd);
            document.removeEventListener('touchend', cardEl._dragListeners.handleEnd);
        }

        if (direction === 'right') {
            cardEl.classList.add('swipe-right-anim');
            document.getElementById(`stamp-like-${index}`).style.opacity = 1;
            
            // שינוי מהותי: פותחים ישירות את תיק המועמד ללא מסך מקשר!
            currentMatchedItem = currentDeck[index];
            matchCount++; document.getElementById('match-count').innerText = matchCount;
            
            setTimeout(() => openInterviewModal(), 300);

        } else {
            cardEl.classList.add('swipe-left-anim');
            document.getElementById(`stamp-nope-${index}`).style.opacity = 1;
        }

        setTimeout(() => {
            cardEl.remove(); topCardIndex++; renderCards();
            const nextCard = document.getElementById(`card-${topCardIndex}`);
            if (nextCard) initDragLogic(nextCard, topCardIndex);
        }, 300);
    }

    function handleButtonAction(dir) {
        const topCard = document.getElementById(`card-${topCardIndex}`);
        if(topCard) processSwipe(dir, topCard, topCardIndex);
    }

    // --- תיק מועמד והכנה לראיון (מחליף את הפתקית) ---
    function openInterviewModal(item = currentMatchedItem, targetName = currentTargetName) {
        currentMatchedItem = item;
        currentTargetName = targetName;
        
        // הגדרת תוכן התיק
        document.getElementById('interview-phone').innerText = currentMatchedItem.phone;
        document.getElementById('interview-target-name').innerText = currentTargetName;
        document.getElementById('interview-score').innerText = currentMatchedItem.culturalFit;
        
        document.getElementById('interview-skills').innerHTML = currentMatchedItem.skills.map(s => `<span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs ml-1 inline-block border border-slate-200">${s}</span>`).join('');

        const questionsUl = document.getElementById('interview-questions');

        if(currentUserRole === 'employer') {
            // התיק מציג קורות חיים של מועמד
            document.getElementById('interview-name').innerText = currentMatchedItem.name;
            document.getElementById('interview-title').innerText = currentMatchedItem.title;
            document.getElementById('interview-experience').innerText = currentMatchedItem.experience;
            document.getElementById('interview-education').innerText = currentMatchedItem.degree;
            document.getElementById('interview-salary').innerText = currentMatchedItem.salary;
            document.getElementById('interview-about').innerText = currentMatchedItem.about;
            
            questionsUl.innerHTML = `
                <li class="flex items-start gap-2"><div class="bg-emerald-100 text-emerald-700 rounded-full w-5 h-5 flex items-center justify-center text-xs mt-0.5 flex-shrink-0">1</div> <div>"שמתי לב לניסיון שלך ב-${currentMatchedItem.skills[0]}, תוכל/י לפרט על פרויקט מרכזי שעשית בתחום?"</div></li>
                <li class="flex items-start gap-2"><div class="bg-emerald-100 text-emerald-700 rounded-full w-5 h-5 flex items-center justify-center text-xs mt-0.5 flex-shrink-0">2</div> <div>"מה הזמינות שלך לתחילת עבודה במשרה של ${currentTargetName}?"</div></li>
                <li class="flex items-start gap-2"><div class="bg-emerald-100 text-emerald-700 rounded-full w-5 h-5 flex items-center justify-center text-xs mt-0.5 flex-shrink-0">3</div> <div>"אילו אתגרים מקצועיים אתה/את מחפש/ת בתפקיד הבא?"</div></li>
            `;
        } else {
            // התיק מציג פרטי משרה (החברה היא ה"מועמד" לאישור)
            document.getElementById('interview-name').innerText = currentMatchedItem.company;
            document.getElementById('interview-title').innerText = `דרוש/ה: ${currentMatchedItem.title}`;
            document.getElementById('interview-experience').innerText = `מיקום: ${currentMatchedItem.location}`;
            document.getElementById('interview-education').innerText = currentMatchedItem.availability;
            document.getElementById('interview-salary').innerText = `תקציב: ${currentMatchedItem.salary}`;
            document.getElementById('interview-about').innerText = currentMatchedItem.about;
            
            questionsUl.innerHTML = `
                <li class="flex items-start gap-2"><div class="bg-emerald-100 text-emerald-700 rounded-full w-5 h-5 flex items-center justify-center text-xs mt-0.5 flex-shrink-0">1</div> <div>"היי, אני מתקשר בקשר למועמד/ת שלי (${currentTargetName}). האם המשרה ב-${currentMatchedItem.location} עדיין רלוונטית?"</div></li>
                <li class="flex items-start gap-2"><div class="bg-emerald-100 text-emerald-700 rounded-full w-5 h-5 flex items-center justify-center text-xs mt-0.5 flex-shrink-0">2</div> <div>"האם המודל (${currentMatchedItem.availability}) גמיש במידת הצורך?"</div></li>
                <li class="flex items-start gap-2"><div class="bg-emerald-100 text-emerald-700 rounded-full w-5 h-5 flex items-center justify-center text-xs mt-0.5 flex-shrink-0">3</div> <div>"המועמד חזק מאוד ב-${currentMatchedItem.skills[0]}, האם זה פקטור משמעותי עבורכם?"</div></li>
            `;
        }

        document.getElementById('interview-modal').classList.replace('hidden', 'flex');
    }

    function closeInterviewModal() {
        document.getElementById('interview-modal').classList.replace('flex', 'hidden');
    }

    function saveAndCloseInterview() {
        const exists = savedNotes.find(note => note.item.id === currentMatchedItem.id);
        if (!exists) {
            savedNotes.push({
                item: currentMatchedItem, targetName: currentTargetName, role: currentUserRole,
                timestamp: new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })
            });
            const badge = document.getElementById('archive-badge');
            badge.innerText = savedNotes.length; badge.classList.remove('hidden');
            showToast('התיק נשמר בארכיון', 'success');
        }
        closeInterviewModal();
    }

    function openArchive() { renderArchive(); document.getElementById('archive-modal').classList.replace('hidden', 'flex'); }
    function closeArchive() { document.getElementById('archive-modal').classList.replace('flex', 'hidden'); }

    function renderArchive() {
        const listEl = document.getElementById('archive-list');
        if (savedNotes.length === 0) {
            listEl.innerHTML = `<div class="text-center text-slate-400 mt-16"><i class="fa-solid fa-folder-open text-6xl mb-4 text-slate-300"></i><h3 class="text-lg font-bold text-slate-600">הארכיון ריק</h3></div>`;
            return;
        }
        listEl.innerHTML = savedNotes.map((note, index) => {
            const isEmployer = note.role === 'employer';
            const subject = isEmployer ? note.item.name : note.item.company;
            return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center hover:border-emerald-300 transition-all cursor-pointer" onclick="viewArchivedNote(${index})">
                    <div>
                        <h4 class="font-bold text-slate-800 cv-name text-lg">${subject}</h4>
                        <p class="text-xs text-slate-500 mt-1">עבור: ${note.targetName}</p>
                    </div>
                    <div class="text-slate-400"><i class="fa-solid fa-chevron-left"></i></div>
                </div>
            `;
        }).reverse().join('');
    }

    function viewArchivedNote(index) {
        const note = savedNotes[index];
        const originalRole = currentUserRole;
        currentUserRole = note.role;
        openInterviewModal(note.item, note.targetName);
        currentUserRole = originalRole;
    }

    function rewindCard() {
        if (!lastSwipedCard) return showToast('אין פעולה לבטל', 'info');
        if (lastSwipedCard.direction === 'right') {
            matchCount = Math.max(0, matchCount - 1); document.getElementById('match-count').innerText = matchCount;
        }
        topCardIndex--; lastSwipedCard = null;
        document.getElementById('cards-container').querySelectorAll('.swipe-card').forEach(c => c.remove());
        renderCards(); showToast('הכרטיס הוחזר', 'success');
    }

    function showToast(msg, type = 'info') {
        const toast = document.getElementById('toast');
        toast.querySelector('span').innerHTML = msg;
        toast.querySelector('i').className = type === 'error' ? 'fa-solid fa-triangle-exclamation text-red-400' : type === 'success' ? 'fa-solid fa-circle-check text-emerald-400' : 'fa-solid fa-circle-info text-blue-400';
        toast.style.bottom = '30px'; setTimeout(() => { toast.style.bottom = '-100px'; }, 3000);
    }
</script>
